# Render Blueprint - optional. Add DATABASE_URL and REDIS_URL in dashboard after creating DB/Redis.
# See https://render.com/docs/blueprint-spec
services:
  - type: web
    name: rabota-20-app
    env: python
    buildCommand: |
      cd frontend && npm install && npm run build
      cd ../backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://rabota-20-app.onrender.com/api
